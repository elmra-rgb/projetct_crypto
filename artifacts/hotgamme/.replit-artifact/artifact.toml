kind = "mobile"
previewPath = "/"
title = "HotGamme - Gestion Accidents"
version = "1.0.0"
id = "artifacts/hotgamme"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 18933
name = "expo"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/hotgamme run dev"

[services.env]
PORT = "18933"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/hotgamme", "run", "build"]
run = ["pnpm", "--filter", "@workspace/hotgamme", "run", "serve"]
